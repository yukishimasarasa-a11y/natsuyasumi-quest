<script>
  // ============================================================
  // グローバルエラーハンドリング
  //   JSの実行中にエラーが発生した場合、コンソールに出るだけで
  //   画面が「読み込み中…」のまま無言で止まらないよう、
  //   画面上部に赤いバナーで表示します。
  // ============================================================
  function showFatalError(message) {
    var banner = document.getElementById("fatal-error-banner");
    if (!banner) return;
    banner.style.display = "block";
    banner.textContent = "⚠️ エラーが発生しました： " + message;
  }
  window.addEventListener("error", function (e) {
    var loc = "";
    if (e && e.filename) {
      loc = " (" + e.filename.split("/").pop() + ":" + e.lineno + ":" + e.colno + ")";
    }
    showFatalError(((e && e.message) || String(e)) + loc);
  });
  window.addEventListener("unhandledrejection", function (e) {
    var reason = e && e.reason;
    showFatalError((reason && reason.message) || String(reason));
  });
</script>

<script>
  // ============================================================
  // Firebaseプロジェクトの設定値
  //   databaseURL は設定済みです。
  //   apiKey / appId などは未設定でも Realtime Database の
  //   読み書きだけなら動作しますが、念のためプレースホルダーを
  //   残しています。Firebaseコンソールの
  //   「プロジェクトの設定」→「マイアプリ」→「SDKの設定と構成」に
  //   表示される値に差し替えるとより安定します。
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyCfS4xZcxUV05bNcIhEtf22VWqFTsWXzkQ",
    authDomain: "natsuyasumi-quest.firebaseapp.com",
    databaseURL: "https://natsuyasumi-quest-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "natsuyasumi-quest",
    storageBucket: "natsuyasumi-quest.firebasestorage.app",
    messagingSenderId: "696597156812",
    appId: "1:696597156812:web:65f1bb4338dfb7965e8369"
  };

  // db の初期化に失敗しても画面が固まらないよう、必ずtry/catchで囲む
  let db = null;
  window.__FIREBASE_INIT_ERROR__ = null;
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  } catch (e) {
    window.__FIREBASE_INIT_ERROR__ = e.message || String(e);
    showFatalError(window.__FIREBASE_INIT_ERROR__);
  }

  // window.storage 互換のヘルパー（第2引数のsharedは使わず常に共有データとして扱う）
  async function storageGet(key) {
    if (!db) throw new Error("Firebaseが初期化されていません");
    const snap = await db.ref(key).once("value");
    if (!snap.exists()) return null;
    return { key, value: snap.val(), shared: true };
  }
  async function storageSet(key, value) {
    if (!db) throw new Error("Firebaseが初期化されていません");
    await db.ref(key).set(value);
    return { key, value, shared: true };
  }
  async function storageDelete(key) {
    if (!db) throw new Error("Firebaseが初期化されていません");
    await db.ref(key).remove();
    return { key, deleted: true, shared: true };
  }
</script>

];

// ---- 成長する剣士キャラクター ----
const LEVELS = [
  { min: 0, name: "見習い", body: "#DCEEDD", pattern: false, trim: false, aura: false },
  { min: 20, name: "修行中", body: "#8FC79A", pattern: true, trim: false, aura: false },
  { min: 50, name: "一人前", body: "#4C8C5A", pattern: true, trim: true, aura: false },
  { min: 100, name: "剣豪", body: "#2E5E3C", pattern: true, trim: true, aura: true },
];
const getLevel = (pts) => {
  let idx = 0;
  LEVELS.forEach((l, i) => { if (pts >= l.min) idx = i; });
  return idx;
};

function WarriorCharacter({ points }) {
  const idx = getLevel(points);
  const level = LEVELS[idx];
  const next = LEVELS[idx + 1];
  const progress = next ? Math.min(1, (points - level.min) / (next.min - level.min)) : 1;

  return (
    <div style={{ background: "white", borderRadius: 20, padding: 16, marginBottom: 16, boxShadow: "0 2px 10px rgba(0,0,0,0.06)", textAlign: "center", position: "relative", overflow: "hidden" }}>
      {level.aura && (
        <div style={{ position: "absolute", inset: 0, background: `radial-gradient(circle at 50% 45%, ${PALETTE.sun2}66, transparent 60%)`, animation: "pulse 2.2s ease-in-out infinite" }} />
      )}
      <style>{`@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}`}</style>
      <img
        src={LEVEL_IMAGES[idx]}
        alt={level.name}
        style={{
          width: 140,
          height: 220,
          objectFit: "contain",
          objectPosition: "top",
          position: "relative",
          filter: level.aura ? "drop-shadow(0 0 14px rgba(245,166,35,0.55))" : "none",
        }}
      />
      <p style={{ margin: "4px 0 2px", fontWeight: 800, fontSize: 15, color: PALETTE.navy }}>{level.name}</p>
      <div style={{ background: "#eee", height: 8, borderRadius: 999, overflow: "hidden", margin: "6px 0" }}>
        <div style={{ width: `${progress * 100}%`, height: "100%", background: `linear-gradient(90deg, ${PALETTE.leaf}, ${PALETTE.sun})`, transition: "width 0.4s" }} />
      </div>
      <p style={{ margin: 0, fontSize: 11, color: "#888" }}>
        {next ? `次の「${next.name}」まであと ${next.min - points}pt` : "最高レベルに到達！お見事！"}
      </p>
    </div>
  );
}

function App() {
  const [state, setState] = useState(DEFAULT_STATE);
  const [loaded, setLoaded] = useState(false);
  const [errorMsg, setErrorMsg] = useState(window.__FIREBASE_INIT_ERROR__ || null);
  const [view, setView] = useState("today");
  const [calMonth, setCalMonth] = useState(() => {
    const n = new Date();
    return { y: n.getFullYear(), m: n.getMonth() };
  });
  const [selectedDay, setSelectedDay] = useState(null);
  const [celebrate, setCelebrate] = useState(null);
  const [photos, setPhotos] = useState({}); // key: "date:taskId" -> dataURL
  const fileInputRef = useRef(null);
  const pendingPhotoTarget = useRef(null);

  // ---- 初期読み込み＋リアルタイム同期 ----
  // Firebase Realtime Database の「state」を常時購読。
  // 家族の誰かが更新すると、他の端末にも自動で反映されます。
  useEffect(() => {
    // Firebaseの初期化自体に失敗している場合は、接続を試みず即エラー表示にする
    if (!db) {
      setErrorMsg(window.__FIREBASE_INIT_ERROR__ || "Firebaseの初期化に失敗しました");
      setLoaded(true);
      return;
    }

    let settled = false;
    const stateRef = db.ref("state");
    const listener = stateRef.on(
      "value",
      (snap) => {
        settled = true;
        if (snap.exists()) {
          try {
            const raw = snap.val();
            const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
            setState(parsed);
          } catch (e) {
            console.error("データの読み込みに失敗しました", e);
            setErrorMsg("保存されているデータの形式が正しくありません: " + (e.message || e));
          }
          setLoaded(true);
        } else {
          const seeded = {
            tasks: SEED_TASKS.map((t, i) => ({ id: `seed-${i}`, ...t })),
            completions: {},
          };
          stateRef.set(JSON.stringify(seeded)).catch((e) => {
            console.error("初期クエストの保存に失敗しました", e);
            setErrorMsg("初期データの保存に失敗しました: " + (e.message || e));
          });
          setState(seeded);
          setLoaded(true);
        }
      },
      (error) => {
        settled = true;
        console.error("Firebaseとの接続に失敗しました", error);
        setErrorMsg(
          "Firebaseとの接続に失敗しました: " +
            (error.message || error) +
            "\nRealtime Databaseのルール（読み書き権限）を確認してください。"
        );
        setLoaded(true);
      }
    );

    // 一定時間たっても応答がなければ「読み込み中…」で無言停止させず、
    // タイムアウトとして知らせる
    const timeoutId = setTimeout(() => {
      if (!settled) {
        setErrorMsg(
          "Firebaseからの応答がありません（タイムアウト）。ネットワーク接続や、Realtime Databaseのルール・URLを確認してください。"
        );
        setLoaded(true);
      }
    }, 10000);

    return () => {
      stateRef.off("value", listener);
      clearTimeout(timeoutId);
    };
  }, []);

  const saveState = useCallback(async (next) => {
    setState(next);
    try {
      await storageSet("state", JSON.stringify(next), true);
    } catch (e) {
      console.error("保存に失敗しました", e);
    }
  }, []);

  // ---- タスク管理 ----
  const addTask = (task) => {
    const next = { ...state, tasks: [...state.tasks, { id: Date.now().toString(), ...task }] };
    saveState(next);
  };
  const removeTask = (id) => {
    const next = { ...state, tasks: state.tasks.filter((t) => t.id !== id) };
    saveState(next);
  };
  const editTask = (id, updates) => {
    const next = { ...state, tasks: state.tasks.map((t) => (t.id === id ? { ...t, ...updates } : t)) };
    saveState(next);
  };

  // 今日やるべきタスク一覧を算出
  const getDueTasks = (dateKey) => {
    const daily = state.tasks.filter((t) => t.type === "daily");
    const dated = state.tasks.filter((t) => {
      if (t.type !== "date") return false;
      const doneAlready = state.completions[dateKey]?.[t.id]?.done;
      if (doneAlready) return true; // 今日終わらせたものは表示
      const isPastDoneElsewhere = Object.values(state.completions).some((day) => day[t.id]?.done);
      if (isPastDoneElsewhere) return false;
      return t.dueDate >= dateKey; // 締切がまだ先 or 今日
    });
    return [...daily, ...dated];
  };

  const toggleDone = (dateKey, taskId) => {
    const task = state.tasks.find((t) => t.id === taskId);
    const day = state.completions[dateKey] || {};
    const current = day[taskId]?.done || false;
    const next = {
      ...state,
      completions: {
        ...state.completions,
        [dateKey]: { ...day, [taskId]: { ...day[taskId], done: !current } },
      },
    };
    saveState(next);
    if (!current) {
      setCelebrate(task?.title || "");
      setTimeout(() => setCelebrate(null), 1400);
    }
  };

  const toggleVerify = (dateKey, taskId) => {
    const day = state.completions[dateKey] || {};
    const current = day[taskId]?.verified || false;
    const next = {
      ...state,
      completions: {
        ...state.completions,
        [dateKey]: { ...day, [taskId]: { ...day[taskId], verified: !current } },
      },
    };
    saveState(next);
  };

  const loadPhoto = async (dateKey, taskId) => {
    const key = `${dateKey}:${taskId}`;
    if (photos[key]) return;
    try {
      const res = await storageGet(`photo:${key}`, true);
      if (res && res.value) setPhotos((p) => ({ ...p, [key]: res.value }));
    } catch (e) {
      /* まだ写真なし */
    }
  };

  const handlePhotoPick = (dateKey, taskId) => {
    pendingPhotoTarget.current = { dateKey, taskId };
    fileInputRef.current?.click();
  };

  const onFileChosen = (e) => {
    const file = e.target.files?.[0];
    const target = pendingPhotoTarget.current;
    if (!file || !target) return;
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (ev) => {
      img.onload = async () => {
        const canvas = document.createElement("canvas");
        const maxW = 480;
        const scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.6);
        const key = `${target.dateKey}:${target.taskId}`;
        try {
          await storageSet(`photo:${key}`, dataUrl, true);
          setPhotos((p) => ({ ...p, [key]: dataUrl }));
        } catch (err) {
          console.error("写真の保存に失敗しました", err);
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const taskPointsMap = state.tasks.reduce((map, t) => {
    map[t.id] = t.points || 0;
    return map;
  }, {});
  const totalStamps = Object.values(state.completions).reduce(
    (sum, day) =>
      sum + Object.entries(day).reduce(
        (daySum, [taskId, v]) => daySum + (v.done ? (taskPointsMap[taskId] || 0) : 0),
        0
      ),
    0
  );

  const daysUntilTarget = Math.max(0, Math.ceil((new Date(TARGET_DATE) - new Date(todayKey())) / 86400000));

  const todayDue = getDueTasks(todayKey());
  const todayCompletions = state.completions[todayKey()] || {};
  const undoneCount = todayDue.filter((t) => !todayCompletions[t.id]?.done).length;

  if (errorMsg) {
    return (
      <div style={{ background: PALETTE.sand, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ background: "white", borderRadius: 18, padding: "20px 22px", maxWidth: 420, boxShadow: "0 4px 16px rgba(0,0,0,0.1)", border: `2px solid ${PALETTE.melon}` }}>
          <p style={{ margin: "0 0 8px", fontWeight: 800, color: PALETTE.melon, fontSize: 16 }}>⚠️ 読み込みに失敗しました</p>
          <p style={{ margin: 0, fontSize: 13, color: PALETTE.navy, whiteSpace: "pre-wrap" }}>{errorMsg}</p>
        </div>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div style={{ background: PALETTE.sand, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p style={{ color: PALETTE.navy, fontWeight: 700 }}>読み込み中…</p>
      </div>
    );
  }

  return (
    <div style={{ background: PALETTE.sand, minHeight: "100vh", fontFamily: "'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif", color: PALETTE.navy, paddingBottom: 88 }}>
      <input type="file" accept="image/*" capture="environment" ref={fileInputRef} onChange={onFileChosen} style={{ display: "none" }} />

      {/* ヘッダー */}
      <div style={{ background: `linear-gradient(135deg, ${PALETTE.sky}, ${PALETTE.skyDeep})`, padding: "22px 20px 28px", color: "white", borderRadius: "0 0 28px 28px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -20, right: -10, fontSize: 90, opacity: 0.18 }}>☀️</div>
        <p style={{ margin: 0, fontSize: 13, letterSpacing: 2, opacity: 0.85 }}>SUMMER QUEST LOG</p>
        <h1 style={{ margin: "4px 0 14px", fontSize: 26, fontWeight: 800 }}>夏休みクエストボード</h1>
        <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,0.18)", padding: "8px 14px", borderRadius: 999 }}>
          <Star size={18} fill={PALETTE.sun} color={PALETTE.sun} />
          <span style={{ fontWeight: 800, fontSize: 18 }}>{totalStamps}</span>
          <span style={{ fontSize: 13, opacity: 0.9 }}>個のスタンプ集めたよ！</span>
        </div>
        <div style={{ marginTop: 10, display: "inline-flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,0.18)", padding: "6px 12px", borderRadius: 999, marginLeft: 8 }}>
          <span style={{ fontSize: 12, opacity: 0.9 }}>🎯 目標達成日：8/23まで あと{daysUntilTarget}日</span>
        </div>
      </div>

      {celebrate && (
        <div style={{ position: "fixed", top: "40%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 50, background: "white", border: `3px solid ${PALETTE.sun}`, borderRadius: 20, padding: "18px 26px", boxShadow: "0 10px 30px rgba(0,0,0,0.2)", textAlign: "center", animation: "pop 0.3s ease-out" }}>
          <Sparkles size={30} color={PALETTE.sun} />
          <p style={{ margin: "6px 0 0", fontWeight: 800 }}>「{celebrate}」クリア！</p>
        </div>
      )}
      <style>{`@keyframes pop{0%{transform:translate(-50%,-50%) scale(0.7);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}`}</style>

      <div style={{ padding: "18px 16px 0" }}>
        {view === "today" && <TodayView dateKey={todayKey()} tasks={todayDue} completions={todayCompletions} onToggle={toggleDone} onVerify={toggleVerify} onPhoto={handlePhotoPick} photos={photos} onLoadPhoto={loadPhoto} totalStamps={totalStamps} />}
        {view === "calendar" && (
          <CalendarView
            calMonth={calMonth}
            setCalMonth={setCalMonth}
            completions={state.completions}
            selectedDay={selectedDay}
            setSelectedDay={setSelectedDay}
            tasks={state.tasks}
            getDueTasks={getDueTasks}
            onToggle={toggleDone}
            onVerify={toggleVerify}
            onPhoto={handlePhotoPick}
            photos={photos}
            onLoadPhoto={loadPhoto}
          />
        )}
        {view === "settings" && <SettingsView tasks={state.tasks} onAdd={addTask} onRemove={removeTask} onEdit={editTask} />}
      </div>

      {/* 下部ナビ */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "white", borderTop: `1px solid #eee`, display: "flex", justifyContent: "space-around", padding: "10px 0", boxShadow: "0 -4px 14px rgba(0,0,0,0.06)" }}>
        <NavBtn icon={<Trophy size={22} />} label="今日のクエスト" active={view === "today"} onClick={() => setView("today")} badge={undoneCount > 0 ? undoneCount : null} />
        <NavBtn icon={<CalendarDays size={22} />} label="カレンダー" active={view === "calendar"} onClick={() => setView("calendar")} />
        <NavBtn icon={<Settings size={22} />} label="宿題を設定" active={view === "settings"} onClick={() => setView("settings")} />
      </div>
    </div>
  );
}

function NavBtn({ icon, label, active, onClick, badge }) {
  return (
    <button onClick={onClick} style={{ background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, color: active ? PALETTE.melon : "#999", cursor: "pointer", fontWeight: active ? 800 : 500, position: "relative" }}>
      <div style={{ position: "relative" }}>
        {icon}
        {badge && (
          <span style={{ position: "absolute", top: -6, right: -10, background: PALETTE.melon, color: "white", fontSize: 10, fontWeight: 800, borderRadius: 999, minWidth: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 3px" }}>
            {badge}
          </span>
        )}
      </div>
      <span style={{ fontSize: 11 }}>{label}</span>
    </button>
  );
}

function TaskCard({ task, done, verified, onToggle, onVerify, onPhoto, photoUrl, onLoadPhoto, dateKey }) {
  useEffect(() => {
    onLoadPhoto(dateKey, task.id);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [dateKey, task.id]);

  return (
    <div style={{ background: "white", borderRadius: 18, padding: 14, marginBottom: 12, boxShadow: "0 2px 8px rgba(0,0,0,0.05)", border: done ? `2px solid ${PALETTE.leaf}` : "2px solid transparent" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <button
          onClick={() => onToggle(dateKey, task.id)}
          style={{
            width: 42, height: 42, borderRadius: "50%", border: `2px solid ${done ? PALETTE.leaf : "#ddd"}`,
            background: done ? PALETTE.leaf : "white", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer",
          }}
        >
          {done ? <Check size={22} color="white" /> : <span style={{ fontSize: 18 }}>{task.type === "daily" ? "🔁" : "🎯"}</span>}
        </button>
        <div style={{ flex: 1 }}>
          <p style={{ margin: 0, fontWeight: 800, fontSize: 15, textDecoration: done ? "line-through" : "none", opacity: done ? 0.6 : 1 }}>{task.title}</p>
          <p style={{ margin: "2px 0 0", fontSize: 12, color: "#888" }}>
            {task.type === "daily" ? "毎日クエスト" : `締切：${task.dueDate.slice(5).replace("-", "/")}`} ・ +{task.points}pt
          </p>
        </div>
        <button onClick={() => onPhoto(dateKey, task.id)} style={{ background: PALETTE.sand, border: "none", borderRadius: 12, width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
          <Camera size={18} color={PALETTE.skyDeep} />
        </button>
      </div>
      {photoUrl && (
        <img src={photoUrl} alt="やった証拠" style={{ marginTop: 10, width: "100%", maxHeight: 180, objectFit: "cover", borderRadius: 12 }} />
      )}
      {done && (
        <button
          onClick={() => onVerify(dateKey, task.id)}
          style={{
            marginTop: 10, width: "100%", border: "none", borderRadius: 10, padding: "8px 10px",
            background: verified ? "#eaf6ee" : PALETTE.sand, color: verified ? PALETTE.leaf : "#999",
            fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, cursor: "pointer",
          }}
        >
          {verified ? "✅ おうちの人が確認ずみ" : "🧑‍🤝‍🧑 おうちの人が確認する"}
        </button>
      )}
    </div>
  );
}

function TodayView({ dateKey, tasks, completions, onToggle, onVerify, onPhoto, photos, onLoadPhoto, totalStamps }) {
  const undone = tasks.filter((t) => t.type === "daily" && !completions[t.id]?.done);
  const isEvening = new Date().getHours() >= 18;
  return (
    <div>
      <WarriorCharacter points={totalStamps} />
      {isEvening && undone.length > 0 && (
        <div style={{ background: PALETTE.melon, color: "white", borderRadius: 14, padding: "10px 14px", marginBottom: 14, fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
          <Sparkles size={16} /> 今日はあと{undone.length}個クエストが残ってるよ！寝る前にチャレンジ！
        </div>
      )}
      <p style={{ fontWeight: 800, fontSize: 15, marginBottom: 10 }}>{jpDate(dateKey)}のクエスト</p>
      {tasks.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 0", color: "#999" }}>
          <p style={{ fontSize: 30, margin: 0 }}>🏖️</p>
          <p>「宿題を設定」からクエストを登録してね</p>
        </div>
      )}
      {tasks.map((t) => (
        <TaskCard key={t.id} task={t} done={completions[t.id]?.done || false} verified={completions[t.id]?.verified || false} onToggle={onToggle} onVerify={onVerify} onPhoto={onPhoto} photoUrl={photos[`${dateKey}:${t.id}`]} onLoadPhoto={onLoadPhoto} dateKey={dateKey} />
      ))}
    </div>
  );
}

function CalendarView({ calMonth, setCalMonth, completions, selectedDay, setSelectedDay, tasks, getDueTasks, onToggle, onVerify, onPhoto, photos, onLoadPhoto }) {
  const { y, m } = calMonth;
  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const changeMonth = (delta) => {
    let nm = m + delta, ny = y;
    if (nm < 0) { nm = 11; ny -= 1; }
    if (nm > 11) { nm = 0; ny += 1; }
    setCalMonth({ y: ny, m: nm });
    setSelectedDay(null);
  };

  const dayKey = (d) => `${y}-${pad(m + 1)}-${pad(d)}`;
  const isToday = (d) => dayKey(d) === todayKey();

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <button onClick={() => changeMonth(-1)} style={{ background: "white", border: "none", borderRadius: 10, width: 34, height: 34, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}><ChevronLeft size={18} /></button>
        <p style={{ fontWeight: 800, fontSize: 16 }}>{y}年 {m + 1}月</p>
        <button onClick={() => changeMonth(1)} style={{ background: "white", border: "none", borderRadius: 10, width: 34, height: 34, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}><ChevronRight size={18} /></button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, marginBottom: 6 }}>
        {["日", "月", "火", "水", "木", "金", "土"].map((w) => (
          <div key={w} style={{ textAlign: "center", fontSize: 11, color: "#999", fontWeight: 700 }}>{w}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} />;
          const key = dayKey(d);
          const count = Object.values(completions[key] || {}).filter((v) => v.done).length;
          const isGoal = key === TARGET_DATE;
          return (
            <button
              key={i}
              onClick={() => setSelectedDay(key)}
              style={{
                position: "relative",
                aspectRatio: "1", borderRadius: 12,
                border: isGoal ? `2px solid ${PALETTE.melon}` : isToday(d) ? `2px solid ${PALETTE.melon}` : "1px solid #eee",
                background: isGoal ? `linear-gradient(135deg, ${PALETTE.sun}, ${PALETTE.melon})` : count > 0 ? PALETTE.sun2 : "white",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer",
                boxShadow: isGoal ? "0 2px 8px rgba(255,111,97,0.5)" : "none",
              }}
            >
              {isGoal && (
                <span style={{ position: "absolute", top: -9, fontSize: 14 }}>🏁</span>
              )}
              <span style={{ fontSize: 12, fontWeight: 700, color: isGoal ? "white" : PALETTE.navy }}>{d}</span>
              {isGoal ? (
                <span style={{ fontSize: 9, fontWeight: 800, color: "white" }}>GOAL!</span>
              ) : (
                count > 0 && <span style={{ fontSize: 10 }}>⭐×{count}</span>
              )}
            </button>
          );
        })}
      </div>

      {selectedDay && (
        <div style={{ marginTop: 18, background: "white", borderRadius: 16, padding: 14, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <p style={{ fontWeight: 800, margin: 0 }}>{jpDate(selectedDay)}</p>
            <button onClick={() => setSelectedDay(null)} style={{ background: "none", border: "none", cursor: "pointer" }}><X size={18} /></button>
          </div>
          {getDueTasks(selectedDay).length === 0 && <p style={{ color: "#999", fontSize: 13 }}>この日のクエストはありません</p>}
          {getDueTasks(selectedDay).map((t) => (
            <TaskCard key={t.id} task={t} done={completions[selectedDay]?.[t.id]?.done || false} verified={completions[selectedDay]?.[t.id]?.verified || false} onToggle={onToggle} onVerify={onVerify} onPhoto={onPhoto} photoUrl={photos[`${selectedDay}:${t.id}`]} onLoadPhoto={onLoadPhoto} dateKey={selectedDay} />
          ))}
        </div>
      )}
    </div>
  );
}

function SettingsView({ tasks, onAdd, onRemove, onEdit }) {
  const [title, setTitle] = useState("");
  const [type, setType] = useState("daily");
  const [dueDate, setDueDate] = useState(TARGET_DATE);
  const [points, setPoints] = useState(10);
  const [editingId, setEditingId] = useState(null);
  const [editTitle, setEditTitle] = useState("");
  const [editType, setEditType] = useState("daily");
  const [editDueDate, setEditDueDate] = useState(TARGET_DATE);
  const [editPoints, setEditPoints] = useState(10);

  const submit = () => {
    if (!title.trim()) return;
    onAdd({ title: title.trim(), type, dueDate: type === "date" ? dueDate : null, points: Number(points) || 10 });
    setTitle("");
  };

  const startEdit = (t) => {
    setEditingId(t.id);
    setEditTitle(t.title);
    setEditType(t.type);
    setEditDueDate(t.dueDate || TARGET_DATE);
    setEditPoints(t.points);
  };

  const cancelEdit = () => setEditingId(null);

  const saveEdit = (id) => {
    if (!editTitle.trim()) return;
    onEdit(id, {
      title: editTitle.trim(),
      type: editType,
      dueDate: editType === "date" ? editDueDate : null,
      points: Number(editPoints) || 10,
    });
    setEditingId(null);
  };

  return (
    <div>
      <div style={{ background: "white", borderRadius: 18, padding: 16, marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
        <p style={{ fontWeight: 800, marginBottom: 10 }}>クエストを追加</p>
        <input
          value={title}
          onChange={(e) => setTitle(e.target.value)}
          placeholder="例：音読、計算ドリル1ページ、自由研究"
          style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #ddd", marginBottom: 10, fontSize: 14, boxSizing: "border-box" }}
        />
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <button onClick={() => setType("daily")} style={{ flex: 1, padding: 10, borderRadius: 10, border: type === "daily" ? `2px solid ${PALETTE.sky}` : "1px solid #ddd", background: type === "daily" ? "#eaf6f9" : "white", fontWeight: 700, cursor: "pointer" }}>🔁 毎日</button>
          <button onClick={() => setType("date")} style={{ flex: 1, padding: 10, borderRadius: 10, border: type === "date" ? `2px solid ${PALETTE.melon}` : "1px solid #ddd", background: type === "date" ? "#fff0ee" : "white", fontWeight: 700, cursor: "pointer" }}>🎯 締切あり</button>
        </div>
        {type === "date" && (
          <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #ddd", marginBottom: 10, boxSizing: "border-box" }} />
        )}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <span style={{ fontSize: 13, color: "#666" }}>ポイント</span>
          <input type="number" value={points} onChange={(e) => setPoints(e.target.value)} style={{ width: 70, padding: "8px 10px", borderRadius: 10, border: "1px solid #ddd" }} />
        </div>
        <button onClick={submit} style={{ width: "100%", padding: 12, borderRadius: 12, border: "none", background: PALETTE.melon, color: "white", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, cursor: "pointer" }}>
          <Plus size={18} /> 追加する
        </button>
      </div>

      <p style={{ fontWeight: 800, marginBottom: 8 }}>登録中のクエスト（{tasks.length}）</p>
      {tasks.length === 0 && <p style={{ color: "#999", fontSize: 13 }}>まだ登録されていません</p>}
      {tasks.map((t) => (
        <div key={t.id} style={{ background: "white", borderRadius: 12, padding: "10px 12px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
          {editingId === t.id ? (
            <div>
              <input
                value={editTitle}
                onChange={(e) => setEditTitle(e.target.value)}
                style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #ddd", marginBottom: 8, fontSize: 14, boxSizing: "border-box" }}
              />
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <button onClick={() => setEditType("daily")} style={{ flex: 1, padding: 8, borderRadius: 8, border: editType === "daily" ? `2px solid ${PALETTE.sky}` : "1px solid #ddd", background: editType === "daily" ? "#eaf6f9" : "white", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>🔁 毎日</button>
                <button onClick={() => setEditType("date")} style={{ flex: 1, padding: 8, borderRadius: 8, border: editType === "date" ? `2px solid ${PALETTE.melon}` : "1px solid #ddd", background: editType === "date" ? "#fff0ee" : "white", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>🎯 締切あり</button>
              </div>
              {editType === "date" && (
                <input type="date" value={editDueDate} onChange={(e) => setEditDueDate(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #ddd", marginBottom: 8, boxSizing: "border-box" }} />
              )}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 12, color: "#666" }}>ポイント</span>
                <input type="number" value={editPoints} onChange={(e) => setEditPoints(e.target.value)} style={{ width: 60, padding: "6px 8px", borderRadius: 8, border: "1px solid #ddd" }} />
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => saveEdit(t.id)} style={{ flex: 1, padding: 10, borderRadius: 10, border: "none", background: PALETTE.sky, color: "white", fontWeight: 800, cursor: "pointer" }}>保存する</button>
                <button onClick={cancelEdit} style={{ flex: 1, padding: 10, borderRadius: 10, border: "1px solid #ddd", background: "white", color: "#666", fontWeight: 700, cursor: "pointer" }}>キャンセル</button>
              </div>
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <p style={{ margin: 0, fontWeight: 700, fontSize: 14 }}>{t.title}</p>
                <p style={{ margin: 0, fontSize: 11, color: "#888" }}>{t.type === "daily" ? "毎日" : `締切 ${t.dueDate}`} ・ +{t.points}pt</p>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => startEdit(t)} style={{ background: "none", border: "none", cursor: "pointer", color: PALETTE.sky, padding: 6 }}><Pencil size={18} /></button>
                <button onClick={() => onRemove(t.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#bbb", padding: 6 }}><Trash2 size={18} /></button>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}


try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
} catch (e) {
  showFatalError(e.message || String(e));
}
</script>
</body>
</html>
